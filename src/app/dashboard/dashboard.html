<div class="dashboard-container">

    <div class="header">

        <h2>Project Management System</h2>

        <button (click)="logout()">
            Logout
        </button>

    </div>

    <hr>

    @if(user()) {

    <h3>Welcome {{ user()?.name }}</h3>

    <p>Email : {{ user()?.email }}</p>

    }

    <div class="cards">

        <div class="card">

            <h2>Total Projects</h2>

            <h1>0</h1>

        </div>

        <div class="card">

            <h2>Active Projects</h2>

            <h1>0</h1>

        </div>

        <div class="card">

            <h2>Completed Projects</h2>

            <h1>0</h1>

        </div>

    </div>

</div>
